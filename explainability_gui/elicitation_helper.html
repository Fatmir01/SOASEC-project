<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Explainability Elicitation Helper · §7 GUI Workflow</title>
<style>
  :root {
    --bg: #fafaf7;
    --panel: #ffffff;
    --border: #d8d8d2;
    --text: #1a1a1a;
    --muted: #6b6b66;
    --accent: #2a5a8a;
    --accent-soft: #e3edf6;
    --ok: #2d7a4f;
    --warn: #b8860b;
    --bad: #b03030;
    --code-bg: #f4f3ef;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.45;
  }
  header {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 10px 18px; display: flex; align-items: center; gap: 18px;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
  header .meta { color: var(--muted); font-size: 12px; }
  .mode-tabs { display: flex; gap: 4px; margin-left: auto; }
  .mode-tabs button {
    padding: 6px 12px; border: 1px solid var(--border); background: var(--panel);
    cursor: pointer; font-size: 12px; border-radius: 4px; color: var(--text);
  }
  .mode-tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
  .model-select {
    padding: 6px 8px; border: 1px solid var(--border); background: var(--panel);
    border-radius: 4px; font-size: 12px;
  }
  main { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 110px); }
  aside {
    background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; max-height: calc(100vh - 110px);
  }
  .group { padding: 8px 0; }
  .group-title {
    padding: 6px 14px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted);
    background: var(--code-bg);
  }
  .item {
    padding: 7px 14px; cursor: pointer; border-left: 3px solid transparent;
    display: flex; align-items: center; gap: 8px; font-size: 12px;
  }
  .item:hover { background: var(--accent-soft); }
  .item.active { background: var(--accent-soft); border-left-color: var(--accent); font-weight: 500; }
  .item .status { font-family: monospace; width: 14px; }
  .item .status.empty { color: var(--muted); }
  .item .status.partial { color: var(--warn); }
  .item .status.full { color: var(--ok); }
  .item .id { font-family: monospace; font-size: 11px; }
  .item .label-tag { color: var(--muted); font-size: 10px; margin-left: auto; }

  section.work { padding: 18px 24px; max-height: calc(100vh - 110px); overflow-y: auto; }
  .item-header { margin-bottom: 14px; }
  .item-header h2 { margin: 0 0 4px 0; font-size: 16px; font-family: monospace; }
  .item-header .pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .pill {
    padding: 2px 8px; border-radius: 10px; font-size: 11px;
    background: var(--code-bg); color: var(--muted);
  }
  .pill.divergent { background: #f8e8d8; color: var(--warn); }
  .pill.flip-true { background: #e8f0e8; color: var(--ok); }
  .pill.flip-false { background: #f0e8e8; color: var(--bad); }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 14px; }
  .panel-h { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 12px; }
  .panel-h .actions { margin-left: auto; display: flex; gap: 6px; }
  .panel-body { padding: 12px; }

  textarea, .display-text {
    width: 100%; font-family: 'SF Mono', Menlo, monospace; font-size: 12px;
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--code-bg); color: var(--text); resize: vertical;
  }
  textarea { min-height: 70px; }
  .display-text { white-space: pre-wrap; min-height: 40px; max-height: 240px; overflow-y: auto; }

  button {
    padding: 5px 10px; border: 1px solid var(--border); background: var(--panel);
    cursor: pointer; font-size: 11px; border-radius: 4px; color: var(--text);
  }
  button:hover { background: var(--accent-soft); }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  button.primary:hover { background: #1f4a72; }
  button.copied { background: var(--ok) !important; color: white; border-color: var(--ok); }

  .toggle-row { display: flex; gap: 4px; margin-bottom: 8px; }
  .toggle-row button.active { background: var(--accent); color: white; border-color: var(--accent); }

  .model-block { margin-bottom: 12px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--panel); }
  .model-block h3 { margin: 0 0 8px 0; font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .model-block h3 .badge { font-family: monospace; font-size: 10px; background: var(--code-bg); padding: 2px 6px; border-radius: 3px; color: var(--muted); }
  .parsed-grid { display: grid; grid-template-columns: 110px 1fr; gap: 4px 10px; margin-top: 6px; font-size: 11px; }
  .parsed-grid .k { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; }
  .parsed-grid .v { font-family: monospace; word-break: break-word; }
  .parsed-grid .v.missing { color: var(--bad); font-style: italic; font-family: inherit; }

  .flip-summary { margin-top: 6px; padding: 6px 10px; background: var(--code-bg); border-radius: 4px; font-size: 11px; }
  .flip-summary.match { background: #e8f0e8; }
  .flip-summary.mismatch { background: #f0e8e8; }

  footer {
    background: var(--panel); border-top: 1px solid var(--border);
    padding: 10px 18px; display: flex; align-items: center; gap: 12px; font-size: 12px;
    position: sticky; bottom: 0;
  }
  footer .progress { color: var(--muted); }
  footer .right { margin-left: auto; display: flex; gap: 6px; }

  details summary { cursor: pointer; user-select: none; padding: 4px 0; font-size: 11px; color: var(--muted); }
  details[open] summary { margin-bottom: 6px; }

  .empty-state {
    padding: 60px 30px; text-align: center; color: var(--muted);
  }
  .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
  .empty-state code { background: var(--code-bg); padding: 2px 6px; border-radius: 3px; font-size: 11px; }

  .file-input { display: none; }
  .file-label {
    display: inline-block; padding: 5px 10px; border: 1px solid var(--border);
    background: var(--panel); cursor: pointer; font-size: 11px; border-radius: 4px;
  }
  .file-label:hover { background: var(--accent-soft); }
</style>
</head>
<body>

<header>
  <h1>Explainability Elicitation Helper</h1>
  <span class="meta" id="header-meta">no data loaded</span>
  <div class="mode-tabs">
    <button id="tab-rat" class="active" onclick="setMode('rationalization')">Rationalization (<span id="rat-count">0</span>)</button>
    <button id="tab-cf" onclick="setMode('counterfactual')">Counterfactual (<span id="cf-count">0</span>)</button>
  </div>
  <select class="model-select" id="model-select" onchange="onModelChange()">
    <option value="base">base</option>
    <option value="legends">tuned-legends</option>
    <option value="regulation">tuned-regulation</option>
  </select>
</header>

<main>
  <aside id="navigator">
    <div class="empty-state">
      <h3>Load data to begin</h3>
      <p>Use the buttons in the footer to load <code>expl_sample.jsonl</code> and <code>counterfactual_pairs_template.jsonl</code>.</p>
    </div>
  </aside>

  <section class="work" id="work">
    <div class="empty-state">
      <h3>No item selected</h3>
      <p>Select an item from the left panel after loading data.</p>
    </div>
  </section>
</main>

<footer>
  <span class="progress" id="progress">0 / 0 elicitations completed</span>
  <div class="right">
    <label class="file-label">Load expl_sample.jsonl
      <input type="file" class="file-input" accept=".jsonl,.json" onchange="onLoadSample(event)">
    </label>
    <label class="file-label">Load counterfactual_pairs.jsonl
      <input type="file" class="file-input" accept=".jsonl,.json" onchange="onLoadPairs(event)">
    </label>
    <label class="file-label">Resume from CSV
      <input type="file" class="file-input" accept=".csv" onchange="onLoadCsv(event)">
    </label>
    <button onclick="exportCsv()">Export CSV</button>
    <button onclick="resetState()" title="Clear all responses (cannot undo)">Reset</button>
  </div>
</footer>

<script>
// =========================================================================
// State
// =========================================================================
const STORAGE_KEY = "expl_elicitation_v1";
const DEFAULT_SYSTEM_PROMPT =
  "You are a careful classifier of EU gender-equality policy text. " +
  "Read the input and respond in the EXACT format requested, with no preamble or trailing commentary.";

let state = {
  systemPrompt: DEFAULT_SYSTEM_PROMPT,
  exemplars: [],   // expl_sample records
  pairs: [],       // counterfactual records
  responses: {},   // { item_id: { base: {raw,label,words,rationale}, legends:{}, regulation:{} } }
  currentItemId: null,
  mode: "rationalization",
  cfHalf: "edited",
  currentModel: "base",
};

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      systemPrompt: state.systemPrompt,
      responses: state.responses,
      currentItemId: state.currentItemId,
      mode: state.mode,
      currentModel: state.currentModel,
      // do NOT persist large inputs (exemplars/pairs) — user reloads jsonl per session
    }));
  } catch (e) { console.warn("save failed", e); }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.systemPrompt) state.systemPrompt = s.systemPrompt;
      if (s.responses)    state.responses = s.responses;
      if (s.currentItemId) state.currentItemId = s.currentItemId;
      if (s.mode)         state.mode = s.mode;
      if (s.currentModel) state.currentModel = s.currentModel;
    }
  } catch (e) { console.warn("load failed", e); }
}

// =========================================================================
// JSONL parsing
// =========================================================================
function parseJsonl(text) {
  return text.trim().split(/\r?\n/).filter(Boolean).map(l => JSON.parse(l));
}

function onLoadSample(ev) {
  const f = ev.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    state.exemplars = parseJsonl(e.target.result);
    render();
  };
  r.readAsText(f);
}

function onLoadPairs(ev) {
  const f = ev.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    state.pairs = parseJsonl(e.target.result);
    render();
  };
  r.readAsText(f);
}

// =========================================================================
// Prompts (per task)
// =========================================================================
function elicitationPrompt(task, inputText) {
  if (task === "GE-CLS") {
    return (
      "You will read a passage and classify it according to the EU Gender Equality Strategy taxonomy.\n\n" +
      "Respond in EXACTLY this format and nothing else:\n\n" +
      "LABEL: <one of: violence_stereotypes | equal_economy | leadership_participation | mainstreaming_intersectionality | funding_global_action | unknown>\n" +
      "INFLUENTIAL_WORDS: <comma-separated list of 3-5 words copied verbatim from the passage>\n" +
      "RATIONALE: <one sentence explaining why those words determined the label>\n\n" +
      "PASSAGE:\n" + inputText
    );
  }
  if (task === "GE-NLI") {
    return (
      "You will read a PREMISE and a HYPOTHESIS and decide their logical relationship.\n\n" +
      "Respond in EXACTLY this format and nothing else:\n\n" +
      "LABEL: <one of: entailment | neutral | contradiction>\n" +
      "INFLUENTIAL_WORDS: <comma-separated list of 3-5 words copied verbatim from the premise or hypothesis>\n" +
      "RATIONALE: <one sentence explaining why those words determined the label>\n\n" +
      inputText
    );
  }
  if (task === "GE-STANCE") {
    return (
      "You will read a statement and decide its stance toward EU gender-equality policy.\n\n" +
      "Respond in EXACTLY this format and nothing else:\n\n" +
      "LABEL: <one of: supportive | neutral | against>\n" +
      "INFLUENTIAL_WORDS: <comma-separated list of 3-5 words copied verbatim from the statement>\n" +
      "RATIONALE: <one sentence explaining why those words determined the label>\n\n" +
      "STATEMENT:\n" + inputText
    );
  }
  return "[unknown task: " + task + "]";
}

// =========================================================================
// Response parsing
// =========================================================================
function parseResponse(raw) {
  if (!raw) return { label: "", words: "", rationale: "" };
  const labelMatch    = raw.match(/^\s*LABEL\s*:\s*(.+?)\s*$/im);
  const wordsMatch    = raw.match(/^\s*INFLUENTIAL_WORDS\s*:\s*(.+?)\s*$/im);
  const rationaleMatch = raw.match(/^\s*RATIONALE\s*:\s*([\s\S]+?)\s*$/im);
  return {
    label:     labelMatch     ? labelMatch[1].trim().toLowerCase().replace(/[`*"]/g, "") : "",
    words:     wordsMatch     ? wordsMatch[1].trim().replace(/[`*"]/g, "")               : "",
    rationale: rationaleMatch ? rationaleMatch[1].trim().replace(/^["`*]+|["`*]+$/g, "") : "",
  };
}

// =========================================================================
// Items: unify exemplars + cf pairs into navigator entries
// =========================================================================
function exemplarItem(r) {
  return {
    id: r.id, axis: "Original", task: r.task, source_id: r.source_id,
    input: r.input, gold: r.gold, label: r.label,
    agreement_pattern: r.agreement_pattern,
    expected_flip: null, original_input: null, edit_note: null,
    linked_original_id: null,
  };
}

function pairItem(p, exemplarsBySource) {
  const linked = exemplarsBySource[p.source_id];
  return {
    id: p.pair_id, axis: p.axis, task: p.source_task, source_id: p.source_id,
    input: p.edited_input, gold: linked ? linked.gold : "",
    label: linked ? linked.label : p.label_original,
    agreement_pattern: linked ? linked.agreement_pattern : "",
    expected_flip: p.expected_flip,
    original_input: p.original_input,
    edit_note: p.edit_note,
    linked_original_id: linked ? linked.id : null,
  };
}

function buildItems() {
  const ex = state.exemplars.map(exemplarItem);
  const bySource = Object.fromEntries(state.exemplars.map(r => [r.source_id, r]));
  const cf = state.pairs.map(p => pairItem(p, bySource));
  return { rationalization: ex, counterfactual: cf };
}

function getItemStatus(itemId) {
  const r = state.responses[itemId];
  if (!r) return "empty";
  const filled = ["base", "legends", "regulation"].filter(m => r[m] && r[m].raw && r[m].raw.trim()).length;
  if (filled === 0) return "empty";
  if (filled === 3) return "full";
  return "partial";
}

function statusGlyph(s) {
  return s === "full" ? "✓" : s === "partial" ? "◐" : "○";
}

// =========================================================================
// Render
// =========================================================================
function render() {
  const items = buildItems();
  document.getElementById("rat-count").textContent = items.rationalization.length;
  document.getElementById("cf-count").textContent = items.counterfactual.length;

  // header meta
  const total = items.rationalization.length * 3 + items.counterfactual.length * 3;
  let done = 0;
  Object.values(state.responses).forEach(r => {
    ["base", "legends", "regulation"].forEach(m => { if (r[m] && r[m].raw && r[m].raw.trim()) done++; });
  });
  document.getElementById("header-meta").textContent =
    `${state.exemplars.length} sample · ${state.pairs.length} pairs · ${done}/${total} elicitations`;
  document.getElementById("progress").textContent =
    `${done} / ${total} elicitations completed`;

  // mode tabs
  document.getElementById("tab-rat").classList.toggle("active", state.mode === "rationalization");
  document.getElementById("tab-cf").classList.toggle("active", state.mode === "counterfactual");
  document.getElementById("model-select").value = state.currentModel;

  renderNavigator(items);
  renderWork(items);
}

function renderNavigator(items) {
  const list = state.mode === "rationalization" ? items.rationalization : items.counterfactual;
  if (list.length === 0) {
    document.getElementById("navigator").innerHTML = `
      <div class="empty-state">
        <p>No items in this mode yet. Load the corresponding JSONL file.</p>
      </div>`;
    return;
  }
  // Group by task (rationalization) or axis (counterfactual)
  const groupKey = state.mode === "rationalization" ? "task" : "axis";
  const groups = {};
  list.forEach(it => { (groups[it[groupKey]] = groups[it[groupKey]] || []).push(it); });
  const groupOrder = state.mode === "rationalization"
    ? ["GE-CLS", "GE-NLI", "GE-STANCE"]
    : ["C1", "C2", "C3", "C4"];
  let html = "";
  groupOrder.forEach(g => {
    const arr = groups[g] || [];
    if (!arr.length) return;
    const filled = arr.filter(i => getItemStatus(i.id) === "full").length;
    html += `<div class="group">
      <div class="group-title">${g} <span style="opacity:0.6">(${filled}/${arr.length})</span></div>`;
    arr.forEach(it => {
      const status = getItemStatus(it.id);
      const active = it.id === state.currentItemId ? "active" : "";
      const tag = state.mode === "rationalization"
        ? (it.label || "")
        : `flip:${it.expected_flip ? "T" : "F"}`;
      html += `<div class="item ${active}" onclick="selectItem('${it.id}')">
        <span class="status ${status}">${statusGlyph(status)}</span>
        <span class="id">${it.id}</span>
        <span class="label-tag">${tag}</span>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById("navigator").innerHTML = html;
}

function renderWork(items) {
  const list = state.mode === "rationalization" ? items.rationalization : items.counterfactual;
  const item = list.find(i => i.id === state.currentItemId);
  if (!item) {
    document.getElementById("work").innerHTML = `
      <div class="empty-state">
        <h3>No item selected</h3>
        <p>Select an item from the left panel.</p>
      </div>`;
    return;
  }
  const isCf = state.mode === "counterfactual";
  const r = state.responses[item.id] || {};
  const inputForElicitation = item.input;  // always edited side for cf
  const promptText = elicitationPrompt(item.task, inputForElicitation);
  const displayInput = isCf
    ? (state.cfHalf === "edited" ? item.input : item.original_input)
    : item.input;

  // pills
  let pills = `<span class="pill">${item.task}</span>`;
  if (item.axis !== "Original") pills += `<span class="pill">${item.axis}</span>`;
  if (item.gold) pills += `<span class="pill">gold: ${escapeHtml(item.gold)}</span>`;
  if (item.label && item.label !== item.gold) pills += `<span class="pill">label: ${escapeHtml(item.label)}</span>`;
  if (item.agreement_pattern) {
    const cls = item.agreement_pattern === "divergent" ? "divergent" : "";
    pills += `<span class="pill ${cls}">${item.agreement_pattern}</span>`;
  }
  if (isCf) {
    const flipCls = item.expected_flip ? "flip-true" : "flip-false";
    pills += `<span class="pill ${flipCls}">expected_flip: ${item.expected_flip}</span>`;
    if (item.linked_original_id) pills += `<span class="pill">linked: ${item.linked_original_id}</span>`;
  }

  let html = `
    <div class="item-header">
      <h2>${item.id}</h2>
      <div class="pills">${pills}</div>
    </div>
  `;

  // System prompt panel
  html += `
    <div class="panel">
      <div class="panel-h">System prompt
        <span style="font-weight:400;color:var(--muted);">— set once per session in FineTuneDB</span>
        <div class="actions">
          <button onclick="copyText(this, document.getElementById('sys-prompt').value)">Copy system prompt</button>
        </div>
      </div>
      <div class="panel-body">
        <textarea id="sys-prompt" rows="2" oninput="state.systemPrompt=this.value;saveState()">${escapeHtml(state.systemPrompt)}</textarea>
      </div>
    </div>
  `;

  // Counterfactual original/edited toggle
  if (isCf) {
    html += `
      <div class="panel">
        <div class="panel-h">Inputs
          <div class="toggle-row" style="margin:0;">
            <button class="${state.cfHalf === 'original' ? 'active' : ''}" onclick="setHalf('original')">Original</button>
            <button class="${state.cfHalf === 'edited'   ? 'active' : ''}" onclick="setHalf('edited')">Edited (used in elicitation)</button>
          </div>
        </div>
        <div class="panel-body">
          <details ${item.edit_note ? "open" : ""}>
            <summary>Edit note</summary>
            <div class="display-text" style="background:var(--accent-soft);">${escapeHtml(item.edit_note || "(none)")}</div>
          </details>
          <div class="display-text" style="margin-top:8px;">${escapeHtml(displayInput || "(empty)")}</div>
        </div>
      </div>
    `;
  } else {
    html += `
      <div class="panel">
        <div class="panel-h">Input</div>
        <div class="panel-body">
          <div class="display-text">${escapeHtml(displayInput)}</div>
        </div>
      </div>
    `;
  }

  // Elicitation prompt (always uses item.input, which is the edited side for cf)
  html += `
    <div class="panel">
      <div class="panel-h">Elicitation prompt
        <span style="font-weight:400;color:var(--muted);">— paste into FineTuneDB user message</span>
        <div class="actions">
          <button class="primary" onclick="copyText(this, ${JSON.stringify(promptText).replace(/"/g, '&quot;')})">Copy elicitation prompt</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="display-text">${escapeHtml(promptText)}</div>
      </div>
    </div>
  `;

  // Per-model response blocks
  ["base", "legends", "regulation"].forEach(m => {
    const resp = (r[m] || { raw: "", label: "", words: "", rationale: "" });
    const parsed = parseResponse(resp.raw);
    // Use stored values if present, otherwise re-parse
    const eff = {
      label:     resp.label     || parsed.label,
      words:     resp.words     || parsed.words,
      rationale: resp.rationale || parsed.rationale,
    };
    const isCurrent = state.currentModel === m;
    html += `
      <div class="model-block" id="model-${m}" style="${isCurrent ? "border-color:var(--accent);" : ""}">
        <h3>
          ${m === "base" ? "base" : m === "legends" ? "tuned-legends" : "tuned-regulation"}
          ${isCurrent ? '<span class="badge" style="background:var(--accent);color:white;">current</span>' : '<span class="badge">click to set as current</span>'}
        </h3>
        <textarea
          rows="5"
          placeholder="Paste raw response from FineTuneDB here"
          oninput="onResponseInput('${item.id}', '${m}', this.value)"
          onfocus="state.currentModel='${m}';document.getElementById('model-select').value='${m}';saveState();highlightCurrent();"
        >${escapeHtml(resp.raw)}</textarea>
        <div class="parsed-grid">
          <span class="k">Label</span>
          <span class="v ${eff.label ? "" : "missing"}">${eff.label ? escapeHtml(eff.label) : "(not parsed)"}</span>
          <span class="k">Influential words</span>
          <span class="v ${eff.words ? "" : "missing"}">${eff.words ? escapeHtml(eff.words) : "(not parsed)"}</span>
          <span class="k">Rationale</span>
          <span class="v ${eff.rationale ? "" : "missing"}">${eff.rationale ? escapeHtml(eff.rationale) : "(not parsed)"}</span>
        </div>
        ${isCf ? renderFlipSummary(item, m, eff.label) : ""}
      </div>
    `;
  });

  // Nav buttons
  html += `
    <div style="display:flex;gap:6px;margin-top:8px;">
      <button onclick="navItem(-1)">‹ Previous item</button>
      <button onclick="navItem(1)">Next item ›</button>
    </div>
  `;

  document.getElementById("work").innerHTML = html;
}

function renderFlipSummary(item, model, editedLabel) {
  if (!item.linked_original_id) {
    return `<div class="flip-summary">No linked Original row — flip cannot be computed.</div>`;
  }
  const orig = state.responses[item.linked_original_id];
  if (!orig || !orig[model] || !orig[model].raw) {
    return `<div class="flip-summary">Linked Original (${item.linked_original_id}) not yet elicited for <code>${model}</code>.</div>`;
  }
  const origLabel = orig[model].label || parseResponse(orig[model].raw).label;
  if (!editedLabel) {
    return `<div class="flip-summary">Edited response not yet parsed.</div>`;
  }
  const flipped = origLabel.toLowerCase() !== editedLabel.toLowerCase();
  const matches = (flipped === item.expected_flip);
  return `<div class="flip-summary ${matches ? "match" : "mismatch"}">
    original: <b>${escapeHtml(origLabel)}</b> →
    edited: <b>${escapeHtml(editedLabel)}</b> ·
    flipped: <b>${flipped}</b> ·
    expected: <b>${item.expected_flip}</b> ·
    ${matches ? "✓ match" : "✗ mismatch"}
  </div>`;
}

function highlightCurrent() {
  ["base", "legends", "regulation"].forEach(m => {
    const el = document.getElementById("model-" + m);
    if (el) el.style.borderColor = (state.currentModel === m) ? "var(--accent)" : "var(--border)";
  });
}

// =========================================================================
// Event handlers
// =========================================================================
function onResponseInput(itemId, model, raw) {
  if (!state.responses[itemId]) state.responses[itemId] = {};
  const parsed = parseResponse(raw);
  state.responses[itemId][model] = {
    raw, label: parsed.label, words: parsed.words, rationale: parsed.rationale,
  };
  saveState();
  // Update parsed preview without re-rendering input boxes (preserves cursor)
  const block = document.getElementById("model-" + model);
  if (block) {
    const grid = block.querySelector(".parsed-grid");
    if (grid) {
      const cells = grid.querySelectorAll(".v");
      const setCell = (cell, val) => {
        cell.textContent = val || "(not parsed)";
        cell.classList.toggle("missing", !val);
      };
      setCell(cells[0], parsed.label);
      setCell(cells[1], parsed.words);
      setCell(cells[2], parsed.rationale);
    }
    const flip = block.querySelector(".flip-summary");
    if (flip) {
      const items = buildItems();
      const list = state.mode === "rationalization" ? items.rationalization : items.counterfactual;
      const item = list.find(i => i.id === itemId);
      flip.outerHTML = renderFlipSummary(item, model, parsed.label);
    }
  }
  // Update navigator status & progress without full re-render
  updateNavigatorStatus(itemId);
  updateProgress();
}

function updateNavigatorStatus(itemId) {
  const status = getItemStatus(itemId);
  const el = document.querySelector(`.item .id`); // not specific; iterate
  document.querySelectorAll(".item").forEach(div => {
    const idEl = div.querySelector(".id");
    if (idEl && idEl.textContent === itemId) {
      const stEl = div.querySelector(".status");
      stEl.textContent = statusGlyph(status);
      stEl.className = "status " + status;
    }
  });
}

function updateProgress() {
  const items = buildItems();
  const total = items.rationalization.length * 3 + items.counterfactual.length * 3;
  let done = 0;
  Object.values(state.responses).forEach(r => {
    ["base", "legends", "regulation"].forEach(m => {
      if (r[m] && r[m].raw && r[m].raw.trim()) done++;
    });
  });
  document.getElementById("progress").textContent = `${done} / ${total} elicitations completed`;
  document.getElementById("header-meta").textContent =
    `${state.exemplars.length} sample · ${state.pairs.length} pairs · ${done}/${total} elicitations`;
}

function selectItem(id) {
  state.currentItemId = id;
  saveState();
  render();
}

function setMode(m) {
  state.mode = m;
  state.currentItemId = null;
  saveState();
  render();
}

function setHalf(h) {
  state.cfHalf = h;
  render();
}

function onModelChange() {
  state.currentModel = document.getElementById("model-select").value;
  saveState();
  highlightCurrent();
}

function navItem(delta) {
  const items = buildItems();
  const list = state.mode === "rationalization" ? items.rationalization : items.counterfactual;
  if (!list.length) return;
  const i = list.findIndex(x => x.id === state.currentItemId);
  const j = Math.max(0, Math.min(list.length - 1, (i === -1 ? 0 : i + delta)));
  state.currentItemId = list[j].id;
  saveState();
  render();
}

async function copyText(btn, text) {
  try {
    await navigator.clipboard.writeText(text);
    const original = btn.textContent;
    btn.textContent = "✓ Copied";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove("copied");
    }, 1200);
  } catch (e) {
    alert("Clipboard failed: " + e);
  }
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// =========================================================================
// CSV export / resume
// =========================================================================
const CSV_COLUMNS = [
  "item_id", "task", "axis", "agreement_pattern", "source_id",
  "linked_original_id", "input", "gold_label", "expected_flip",
  "raw_response_base", "parsed_label_base", "influential_words_base", "rationale_base",
  "raw_response_legends", "parsed_label_legends", "influential_words_legends", "rationale_legends",
  "raw_response_regulation", "parsed_label_regulation", "influential_words_regulation", "rationale_regulation",
  "flipped_base", "flipped_legends", "flipped_regulation",
  "flip_matches_expected_base", "flip_matches_expected_legends", "flip_matches_expected_regulation",
  "timestamp_completed", "notes",
];

function csvEscape(v) {
  if (v == null) return "";
  const s = String(v);
  return '"' + s.replace(/"/g, '""') + '"';
}

function buildCsvRow(item, isCf) {
  const r = state.responses[item.id] || {};
  const row = {
    item_id: item.id,
    task: item.task,
    axis: item.axis,
    agreement_pattern: item.agreement_pattern || "",
    source_id: item.source_id,
    linked_original_id: item.linked_original_id || "",
    input: item.input,
    gold_label: item.gold || "",
    expected_flip: (item.expected_flip == null ? "" : String(item.expected_flip)),
    raw_response_base: (r.base || {}).raw || "",
    parsed_label_base: (r.base || {}).label || "",
    influential_words_base: (r.base || {}).words || "",
    rationale_base: (r.base || {}).rationale || "",
    raw_response_legends: (r.legends || {}).raw || "",
    parsed_label_legends: (r.legends || {}).label || "",
    influential_words_legends: (r.legends || {}).words || "",
    rationale_legends: (r.legends || {}).rationale || "",
    raw_response_regulation: (r.regulation || {}).raw || "",
    parsed_label_regulation: (r.regulation || {}).label || "",
    influential_words_regulation: (r.regulation || {}).words || "",
    rationale_regulation: (r.regulation || {}).rationale || "",
    flipped_base: "", flipped_legends: "", flipped_regulation: "",
    flip_matches_expected_base: "", flip_matches_expected_legends: "", flip_matches_expected_regulation: "",
    timestamp_completed: "",
    notes: "",
  };
  // Compute flip flags for cf rows
  if (isCf && item.linked_original_id) {
    const orig = state.responses[item.linked_original_id];
    ["base", "legends", "regulation"].forEach(m => {
      if (orig && orig[m] && orig[m].raw && r[m] && r[m].raw) {
        const oL = (orig[m].label || "").toLowerCase();
        const eL = (r[m].label || "").toLowerCase();
        if (oL && eL) {
          const flipped = oL !== eL;
          row["flipped_" + m] = flipped ? "true" : "false";
          if (item.expected_flip != null) {
            row["flip_matches_expected_" + m] = (flipped === item.expected_flip) ? "true" : "false";
          }
        }
      }
    });
  }
  // Timestamp: any model filled
  const anyFilled = ["base", "legends", "regulation"].some(m => r[m] && r[m].raw);
  if (anyFilled) row.timestamp_completed = new Date().toISOString();
  return row;
}

function exportCsv() {
  const items = buildItems();
  const all = items.rationalization.map(i => buildCsvRow(i, false))
        .concat(items.counterfactual.map(i => buildCsvRow(i, true)));
  let csv = CSV_COLUMNS.map(csvEscape).join(",") + "\n";
  all.forEach(r => {
    csv += CSV_COLUMNS.map(c => csvEscape(r[c])).join(",") + "\n";
  });
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "elicitation_log.csv";
  a.click();
  URL.revokeObjectURL(url);
}

function parseCsv(text) {
  // simple RFC4180-ish parser, sufficient for our quoted-all output
  const rows = [];
  let i = 0, field = "", row = [], inQ = false;
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i += 2; continue; }
      if (c === '"') { inQ = false; i++; continue; }
      field += c; i++;
    } else {
      if (c === '"') { inQ = true; i++; continue; }
      if (c === ',') { row.push(field); field = ""; i++; continue; }
      if (c === '\r') { i++; continue; }
      if (c === '\n') { row.push(field); rows.push(row); row = []; field = ""; i++; continue; }
      field += c; i++;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function onLoadCsv(ev) {
  const f = ev.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    const rows = parseCsv(e.target.result);
    if (!rows.length) return;
    const header = rows[0];
    const idx = Object.fromEntries(header.map((h, i) => [h, i]));
    rows.slice(1).forEach(row => {
      if (!row[idx.item_id]) return;
      const id = row[idx.item_id];
      state.responses[id] = state.responses[id] || {};
      ["base", "legends", "regulation"].forEach(m => {
        const raw = row[idx["raw_response_" + m]] || "";
        if (raw) {
          state.responses[id][m] = {
            raw,
            label: row[idx["parsed_label_" + m]] || "",
            words: row[idx["influential_words_" + m]] || "",
            rationale: row[idx["rationale_" + m]] || "",
          };
        }
      });
    });
    saveState();
    render();
    alert("CSV imported. " + (rows.length - 1) + " rows processed.");
  };
  r.readAsText(f);
}

function resetState() {
  if (!confirm("Clear all elicitation responses? This cannot be undone.")) return;
  state.responses = {};
  saveState();
  render();
}

// =========================================================================
// Boot
// =========================================================================
loadState();
render();
</script>
